<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ICHIGO ガチャガチャ AI店番 - 投影用</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;800&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* negotiate/index.htmlと共通のトークン。この画面は暗い舞台なので、
     朱色そのものよりも提灯の金色(ゴールド)を主アクセントとして使う。 */
  :root { --gold: #e0b25c; --vermilion: #d1573f; }
  body { font-family: 'Zen Maru Gothic', system-ui, sans-serif; margin: 0; padding: 24px; background: #111 url(assets/stage-bg.png) center/cover no-repeat fixed; color: #eee; }
  h1 { font-family: 'Shippori Mincho', serif; font-size: 2rem; margin: 0 0 4px; display: flex; align-items: center; justify-content: center; gap: 12px; }
  .muted { color: #aaa; font-size: 1.1rem; }
  .idle { text-align: center; margin-top: 12vh; }
  .idle h2 { font-family: 'Shippori Mincho', serif; font-size: 2.2rem; color: var(--gold); }
  .characterImg {
    width: 220px; height: 220px; object-fit: contain; display: block; margin: 0 auto 12px;
    transform-origin: bottom center; animation: gentleSway 4.5s ease-in-out infinite;
  }
  @keyframes gentleSway {
    0%, 100% { transform: rotate(-1.8deg); }
    50% { transform: rotate(1.8deg); }
  }
  .characterSmall { width: 64px; height: 64px; object-fit: contain; }
  .priceLine { font-family: 'Shippori Mincho', serif; font-size: 2.2rem; font-weight: 700; color: var(--gold); margin: 8px 0; }
  .turnLine { font-size: 1.3rem; color: #aaa; }
  .chat { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
  .bubble { max-width: 70%; padding: 14px 18px; border-radius: 16px; font-size: 1.4rem; line-height: 1.5; white-space: pre-wrap; }
  .bubble.user { margin-left: auto; background: var(--vermilion); color: #fff8ee; }
  .bubble.assistant { margin-right: auto; background: #2a2a2a; color: #eee; }
  .manualNotice { margin-top: 20px; font-size: 1.6rem; color: #aaa; text-align: center; }
  .completed { position: relative; text-align: center; margin-top: 12vh; }
  .completed .confettiBg { position: absolute; inset: -40px; background: url(assets/confetti-overlay.png) 0 0/300px 300px repeat; opacity: .5; z-index: -1; }
  .completed h2 { font-family: 'Shippori Mincho', serif; font-size: 2.4rem; color: var(--gold); margin-bottom: 12px; }
  .completed .priceLine { justify-content: center; }
  .hidden { display: none; }

  /* ==== 音声有効化オーバーレイ ====
     このページはボタン操作が無い投影専用画面なので、ブラウザの自動再生ブロックを
     解除できるユーザー操作が無い。設営時にスタッフが1回だけタップしてBGMを
     開始してもらうための全画面オーバーレイ。 */
  .soundGate {
    position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,.75);
    display: flex; align-items: center; justify-content: center;
  }
  .soundGateBtn {
    font-family: 'Zen Maru Gothic', system-ui, sans-serif; font-size: 1.3rem; font-weight: 700;
    padding: 20px 32px; border-radius: 14px; border: none; background: var(--gold); color: #2b2118; cursor: pointer;
  }

  /* ==== オンライン参加パネル(2026-07-15追加) ====
     現地の表示(idleView/activeView/completedView)は一切変更しない。全体を
     stageLayoutで横に分割し、右側に最大2タイルのオンラインパネルを追加するだけ。
     オンライン交渉が0件ならパネル自体を隠し、mainStageが自然に全幅へ戻る
     (「可変な感じ」という要望通り、空タイルを置いたままにはしない)。 */
  .stageLayout { display: flex; gap: 24px; align-items: flex-start; }
  .mainStage { flex: 1 1 auto; min-width: 0; }
  .onlinePanel {
    flex: 0 1 33%; max-width: 420px; display: flex; flex-direction: column; gap: 12px;
  }
  .onlinePanel.hidden { display: none; }
  .onlinePanelTitle { font-family: 'Shippori Mincho', serif; font-size: 1.1rem; color: var(--gold); margin: 0 0 4px; text-align: center; }
  .onlineTile {
    background: rgba(255,255,255,.06); border: 1px solid rgba(224,178,92,.35); border-radius: 12px;
    padding: 14px; font-size: .95rem;
  }
  .onlineTile .onlineTileName { font-weight: 700; color: var(--gold); margin-bottom: 4px; }
  .onlineTile .onlineTilePrice { color: #eee; }
  .onlineTile .onlineTileMsg { color: #ccc; font-size: .85rem; margin-top: 6px; white-space: pre-wrap; }

  /* ==== オンライン当選演出(現地のcompletedViewとは別の見た目にして混同を防ぐ) ==== */
  #revealToast {
    position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%);
    background: #1a1410; border: 3px solid var(--gold); border-radius: 16px;
    padding: 16px 26px; text-align: center; z-index: 30; box-shadow: 0 6px 24px rgba(0,0,0,.5);
  }
  #revealToast.hidden { display: none; }
  #revealToast .revealTag {
    display: inline-block; font-size: .75rem; font-weight: 700; color: #2b2118;
    background: var(--gold); border-radius: 6px; padding: 2px 8px; margin-bottom: 8px;
  }
  #revealToast .revealName { font-family: 'Shippori Mincho', serif; font-size: 1.3rem; color: var(--gold); margin: 0 0 4px; }
  #revealToast .revealPrize { color: #fff8ee; font-size: 1.1rem; }
</style>
</head>
<body>
  <div id="soundGate" class="soundGate">
    <button id="soundGateBtn" class="soundGateBtn" type="button">🔈 音声を有効にする(設営時に1回タップ)</button>
  </div>

  <div class="stageLayout">
    <div class="mainStage">
      <div id="idleView" class="idle">
        <img src="assets/ichigoban-greet.png" alt="" class="characterImg">
        <h2>ICHIGO ガチャガチャ AI店番</h2>
        <p class="muted">QRコードをスキャンして交渉を始めてください</p>
      </div>

      <div id="completedView" class="hidden completed">
        <div class="confettiBg"></div>
        <img src="assets/ichigoban-thanks.png" alt="" class="characterImg">
        <h2>ありがとうございました!</h2>
        <p class="priceLine"><span id="completedNameLabel"></span>さん、<span id="completedPriceLabel"></span> ICHIGO</p>
        <p class="muted">次の方、お待たせしました</p>
      </div>

      <div id="activeView" class="hidden">
        <h1><img src="assets/ichigoban-thinking.png" alt="" class="characterSmall">交渉中(<span id="walletLabel"></span>)</h1>
        <p class="priceLine">現在の提示価格: <span id="priceLabel"></span> ICHIGO</p>
        <p class="turnLine" id="turnLine"><span id="turnLabel"></span></p>
        <div class="chat" id="chat"></div>
        <p class="manualNotice hidden" id="manualNotice">スタッフと直接交渉中です</p>
      </div>
    </div>

    <div id="onlinePanel" class="onlinePanel hidden">
      <p class="onlinePanelTitle">🌐 オンライン参加中</p>
      <div id="onlineTiles"></div>
    </div>
  </div>

  <div id="revealToast" class="hidden">
    <div class="revealTag">オンライン参加</div>
    <p class="revealName"><span id="revealName"></span>さんに…</p>
    <p class="revealPrize"><span id="revealPrizeName"></span> が出ました!</p>
  </div>

<script type="module">
const POLL_MS = 2000;
const $ = (id) => document.getElementById(id);

// ==== BGM ====
// お祭りっぽいループ音源(assets/bgm.mp3)を投影画面側でも流す。設営時にスタッフが
// オーバーレイをタップするまでは自動再生ブロックで鳴らせないため、その1回のタップを
// 待ってから開始する。音源が未生成/再生に失敗した場合はcatchで握りつぶし、
// 投影自体は通常通り動作させる。
const bgmAudio = new Audio("assets/bgm.mp3");
bgmAudio.loop = true;
bgmAudio.volume = 0.3;
$("soundGateBtn").addEventListener("click", () => {
  bgmAudio.play().catch(() => {});
  $("soundGate").classList.add("hidden");
});

// 「再描画をスキップするか」の判定キー。transcript.lengthだけで判定すると、
// Aさんの交渉終了直後にBさんが交渉を始め、たまたま会話の往復回数が同じ長さに
// なった場合に、名前・価格ラベルはBさんに切り替わるのにチャット本文だけAさんの
// 古い内容が残る、という誤表示が起きる。マスク済みウォレット(既存の公開フィールド)
// の変化も見ることでセッションの切り替わりを検知する(sessionId自体は/negotiate-message等が
// 知っていれば操作できてしまうため、投影ページ経由で不特定多数に晒す新しい公開項目にはしない)。
let lastRenderedKey = null;

function renderTranscript(wallet, transcript) {
  const key = `${wallet}:${transcript.length}`;
  if (key === lastRenderedKey) return;
  lastRenderedKey = key;
  const chat = $("chat");
  chat.innerHTML = "";
  for (const m of transcript) {
    const div = document.createElement("div");
    div.className = `bubble ${m.role === "user" ? "user" : "assistant"}`;
    div.textContent = m.content;
    chat.appendChild(div);
  }
  chat.scrollTop = chat.scrollHeight;
}

function showOnly(viewId) {
  for (const id of ["idleView", "completedView", "activeView"]) {
    $(id).classList.toggle("hidden", id !== viewId);
  }
}

async function poll() {
  try {
    const res = await fetch("/negotiate-current");
    const data = await res.json();

    if (data.active) {
      showOnly("activeView");
      $("walletLabel").textContent = data.displayName || data.wallet;

      if (data.mode === "manual") {
        // manualモード(店員と対面で交渉)はサーバー側にチャット履歴が無いので、
        // チャット欄の代わりにプレースホルダを出し、ターン数表示も隠す。
        $("chat").classList.add("hidden");
        $("turnLine").classList.add("hidden");
        $("manualNotice").classList.remove("hidden");
        lastRenderedKey = null;
      } else {
        $("chat").classList.remove("hidden");
        $("turnLine").classList.remove("hidden");
        $("manualNotice").classList.add("hidden");
        renderTranscript(data.wallet, data.transcript);
      }

      $("priceLabel").textContent = data.price;
      $("turnLabel").textContent =
        data.status === "awaiting-payment" ? `${data.price} ICHIGOで確定・支払い待ち` : `${data.turn}/${data.maxTurn}ターン`;
      return;
    }

    lastRenderedKey = null;

    if (data.justCompleted) {
      showOnly("completedView");
      $("completedNameLabel").textContent = data.justCompleted.displayName || data.justCompleted.wallet;
      $("completedPriceLabel").textContent = data.justCompleted.price;
      return;
    }

    showOnly("idleView");
  } catch {
    // 一時的な通信エラーは次のポーリングで回復するので無視する
  }
}

poll();
setInterval(poll, POLL_MS);

// ==== オンライン参加パネル・当選演出(2026-07-15追加) ====
// 現地用のpoll()/renderTranscriptとは意図的に完全に別の関数にしている
// (「現地用とオンライン用は完全に別物として扱う」という方針、既存のpoll()は無変更)。
const REVEAL_DISPLAY_MS = 7000; // 1件あたりの当選演出の表示時間

function renderOnlineTiles(sessions) {
  const panel = $("onlinePanel");
  if (!sessions.length) {
    panel.classList.add("hidden");
    return;
  }
  panel.classList.remove("hidden");
  const container = $("onlineTiles");
  container.innerHTML = "";
  for (const s of sessions) {
    const tile = document.createElement("div");
    tile.className = "onlineTile";
    const statusLabel = s.status === "awaiting-payment" ? `${s.price} ICHIGOで確定・支払い待ち`
      : s.status === "awaiting-claim" ? "NFT受け取り待ち"
      : `${s.turn}/${s.maxTurn}ターン`;
    // displayNameはサーバー側でサニタイズ済みだが、lastMessage(参加者のチャット本文)は
    // 自由文字列なのでinnerHTMLで組み立てず、textContentで個別に設定する(XSS対策)。
    const nameEl = document.createElement("div");
    nameEl.className = "onlineTileName";
    nameEl.textContent = s.displayName;
    const priceEl = document.createElement("div");
    priceEl.className = "onlineTilePrice";
    priceEl.textContent = `${s.price} ICHIGO(${statusLabel})`;
    const msgEl = document.createElement("div");
    msgEl.className = "onlineTileMsg";
    msgEl.textContent = s.lastMessage || "";
    tile.append(nameEl, priceEl, msgEl);
    container.appendChild(tile);
  }
}

// 当選演出は複数件が同時に来ても1件ずつ順番に見せる(オンラインは同時に複数人が
// 完了しうるため、現地のcompletedView(手動解除のみ)と同じ「積み上がる」設計にはしない)。
const shownRevealKeys = new Set();
const revealQueue = [];
let revealShowing = false;

function showNextReveal() {
  if (revealShowing || !revealQueue.length) return;
  revealShowing = true;
  const reveal = revealQueue.shift();
  $("revealName").textContent = reveal.displayName;
  $("revealPrizeName").textContent = reveal.prize.name;
  $("revealToast").classList.remove("hidden");
  setTimeout(() => {
    $("revealToast").classList.add("hidden");
    revealShowing = false;
    showNextReveal();
  }, REVEAL_DISPLAY_MS);
}

async function pollOnline() {
  try {
    const res = await fetch("/online-negotiate-current");
    const data = await res.json();
    renderOnlineTiles(data.sessions || []);
    for (const reveal of data.reveals || []) {
      const key = `${reveal.sessionId}:${reveal.revealedAt}`;
      if (shownRevealKeys.has(key)) continue;
      shownRevealKeys.add(key);
      revealQueue.push(reveal);
    }
    showNextReveal();
  } catch {
    // オンラインパネルの通信エラーは、現地の投影(poll())には影響させない
  }
}

pollOnline();
setInterval(pollOnline, POLL_MS);
</script>
</body>
</html>
