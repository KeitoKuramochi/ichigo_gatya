<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ICHIGO 決済</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.2/ethers.umd.min.js"
        integrity="sha512-f+t6//rz3Iy3hp1CiwtsigYtyWuGk7bf6xl2RTOPvmyMIfTQJ4iy6Lg1dah1bsLQ9SLideJGicgmOkBsBXP1aA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<style>
  :root { --pink: #ff6f91; }
  body { font-family: system-ui, sans-serif; max-width: 480px; margin: 40px auto; padding: 0 16px; color: #222; }
  h1 { font-size: 1.4rem; }
  button { font-size: 1rem; padding: 10px 16px; border-radius: 10px; border: none; background: var(--pink); color: #fff; cursor: pointer; }
  button:disabled { background: #ccc; cursor: default; }
  .balance { font-size: 1.6rem; font-weight: 700; color: var(--pink); }
  .muted { color: #888; font-size: .85rem; }
  .ok { color: #1e8449; }
  .err { color: #c0392b; white-space: pre-wrap; }
</style>
</head>
<body>
  <h1>ICHIGO ガチャガチャ</h1>
  <p class="muted">ウォレットを接続して支払うと、実機のガチャガチャのロックが解除されます。</p>

  <button id="connectBtn">① ウォレットを接続</button>
  <p class="muted" id="account"></p>
  <p class="balance" id="balanceLabel"></p>

  <button id="payBtn" disabled>② 支払ってガチャを回す(<span id="costLabel"></span> ICHIGO)</button>
  <p id="status"></p>

<script type="module">
const OP_CHAIN_ID = 10;
const TOKEN_ADDR = "0x836700463Dce76D9Cc3CDf6F6EDF946312c01869";
const GAME_WALLET = "0x70775B1d24176De0fda2776303B8a603C671cFFb"; // 授業のDiscord IDに紐づく自分のウォレット
const COST = 100;
const ERC20_ABI = [
  "function balanceOf(address) view returns (uint256)",
  "function decimals() view returns (uint8)",
  "function transfer(address to, uint256 amount) returns (bool)",
];

const WALLETCONNECT_PROJECT_ID = "7888d175a84dfe42211139f54afc0802";

const $ = (id) => document.getElementById(id);
$("costLabel").textContent = COST;

// このページ自身がブリッジサーバーから配信されている場合は同一オリジン(相対パス)でよいが、
// Vercelなど別オリジンで配信する場合は、QRコードのURLに ?bridge=https://xxxx のように
// その日のブリッジ(トンネル)のURLを付けておけば、それを使って通知する。
const BRIDGE_BASE = new URLSearchParams(location.search).get("bridge") || "";
const VERIFY_URL = BRIDGE_BASE.replace(/\/$/, "") + "/verify-and-unlock";

let provider, signer, account, token, decimals = 18n;

function showStatus(text, cls) {
  $("status").textContent = text;
  $("status").className = cls || "";
}

async function ensureOptimism() {
  const hexId = "0x" + OP_CHAIN_ID.toString(16);
  try {
    await window.ethereum.request({ method: "wallet_switchEthereumChain", params: [{ chainId: hexId }] });
    return true;
  } catch (err) {
    if (err.code === 4902) {
      await window.ethereum.request({
        method: "wallet_addEthereumChain",
        params: [{
          chainId: hexId,
          chainName: "Optimism",
          nativeCurrency: { name: "ETH", symbol: "ETH", decimals: 18 },
          rpcUrls: ["https://mainnet.optimism.io"],
          blockExplorerUrls: ["https://optimistic.etherscan.io"],
        }],
      });
      return true;
    }
    showStatus("Optimismネットワークへの切り替えに失敗しました: " + (err.message || err), "err");
    return false;
  }
}

async function refreshBalance() {
  const bal = await token.balanceOf(account);
  $("balanceLabel").textContent = ethers.formatUnits(bal, decimals) + " ICHIGO";
  return bal;
}

let wcProvider = null;

// window.ethereum(MetaMask拡張機能や、MetaMaskアプリ内ブラウザ)があればそれを使う。
// 無ければ(=普通のSafari/Chromeで開いている)WalletConnectで接続する。
// この場合「接続」ボタンを押すとMetaMaskアプリ自体が自動で開き、承認するとページに戻ってくる。
async function getEip1193Provider() {
  if (window.ethereum) return window.ethereum;

  if (!wcProvider) {
    const { EthereumProvider } = await import("https://esm.sh/@walletconnect/ethereum-provider@2.17.0");
    wcProvider = await EthereumProvider.init({
      projectId: WALLETCONNECT_PROJECT_ID,
      chains: [OP_CHAIN_ID],
      showQrModal: true,
      metadata: {
        name: "ICHIGO ガチャガチャ",
        description: "ICHIGOで支払うと実機のガチャガチャが動きます",
        url: location.origin,
        icons: [],
      },
    });
  }
  await wcProvider.connect();
  return wcProvider;
}

$("connectBtn").addEventListener("click", async () => {
  try {
    const eth = await getEip1193Provider();
    if (eth === window.ethereum && !(await ensureOptimism())) return;

    provider = new ethers.BrowserProvider(eth);
    await provider.send("eth_requestAccounts", []);
    signer = await provider.getSigner();
    account = await signer.getAddress();
    token = new ethers.Contract(TOKEN_ADDR, ERC20_ABI, signer);
    decimals = await token.decimals();

    $("account").textContent = account;
    await refreshBalance();
    $("payBtn").disabled = false;
    showStatus("", "");
  } catch (err) {
    showStatus("接続エラー: " + (err.shortMessage || err.message || err), "err");
  }
});

$("payBtn").addEventListener("click", async () => {
  const btn = $("payBtn");
  try {
    btn.disabled = true;
    const amount = ethers.parseUnits(String(COST), decimals);
    const bal = await refreshBalance();
    if (bal < amount) {
      showStatus(`イチゴが足りません(必要: ${COST})`, "err");
      return;
    }

    showStatus("MetaMaskで送金を承認してください…", "");
    const tx = await token.transfer(GAME_WALLET, amount);

    showStatus("送金を確認中…(数秒)", "");
    await tx.wait();
    await refreshBalance();

    // 同一オリジン(相対パス)か、?bridge=で指定されたトンネルURLに通知し、実機を解除してもらう。
    showStatus("送金確定。ガチャガチャのロックを解除しています…", "");
    const res = await fetch(VERIFY_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ txHash: tx.hash }),
    });
    const data = await res.json();

    if (data.ok) {
      // ESP32はポーリング方式なので、実際に解除されるまで数秒のタイムラグがある。
      showStatus("支払い完了! まもなくガチャガチャのロックが解除されます", "ok");
    } else {
      showStatus("送金の確認に失敗しました: " + (data.error || "不明なエラー"), "err");
    }
  } catch (err) {
    showStatus("エラー: " + (err.shortMessage || err.message || err), "err");
  } finally {
    btn.disabled = false;
  }
});
</script>
</body>
</html>
