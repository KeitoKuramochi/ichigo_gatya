<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ICHIGO ガチャガチャ AI店番</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.2/ethers.umd.min.js"
        integrity="sha512-f+t6//rz3Iy3hp1CiwtsigYtyWuGk7bf6xl2RTOPvmyMIfTQJ4iy6Lg1dah1bsLQ9SLideJGicgmOkBsBXP1aA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<style>
  :root { --pink: #ff6f91; }
  body { font-family: system-ui, sans-serif; max-width: 480px; margin: 40px auto; padding: 0 16px; color: #222; }
  h1 { font-size: 1.4rem; }
  button { font-size: 1rem; padding: 10px 16px; border-radius: 10px; border: none; background: var(--pink); color: #fff; cursor: pointer; }
  button:disabled { background: #ccc; cursor: default; }
  .balance { font-size: 1.6rem; font-weight: 700; color: var(--pink); }
  .muted { color: #888; font-size: .85rem; }
  .ok { color: #1e8449; }
  .err { color: #c0392b; white-space: pre-wrap; }
  .hidden { display: none; }
  .chat { border: 1px solid #ddd; border-radius: 10px; padding: 10px; height: 300px; overflow-y: auto; margin: 12px 0; background: #fafafa; }
  .bubble { max-width: 80%; margin: 6px 0; padding: 8px 12px; border-radius: 12px; font-size: .95rem; line-height: 1.4; white-space: pre-wrap; }
  .bubble.user { margin-left: auto; background: var(--pink); color: #fff; }
  .bubble.assistant { margin-right: auto; background: #eee; color: #222; }
  .chatInputRow { display: flex; gap: 8px; margin-bottom: 8px; }
  .chatInputRow input { flex: 1; font-size: 1rem; padding: 8px 10px; border-radius: 10px; border: 1px solid #ccc; }
  .priceLine { font-size: 1.1rem; font-weight: 700; margin: 4px 0; }
  .nameRow { display: flex; gap: 8px; margin: 8px 0; }
  .nameRow input { flex: 1; font-size: 1rem; padding: 8px 10px; border-radius: 10px; border: 1px solid #ccc; }
  .receipt { border: 2px solid var(--pink); border-radius: 12px; padding: 16px; margin: 12px 0; }
  .receipt h2 { margin: 0 0 8px; font-size: 1.2rem; }
  .receiptRow { margin: 4px 0; }
  .resolutionButtons { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
  .secondaryBtn { background: #888; }
</style>
</head>
<body>
  <h1>ICHIGO ガチャガチャ AI店番</h1>
  <p class="muted">店番AIと少し話して、値段を決めてから支払います。</p>

  <button id="connectBtn">① ウォレットを接続</button>
  <p class="muted" id="account"></p>
  <p class="balance" id="balanceLabel"></p>

  <div id="nameSection" class="hidden">
    <p class="muted">呼び名(任意、みんなに見えます)を入力してください。空欄でも進めます。<br>ひらがな・カタカナ・半角英数字のみ使えます(漢字や絵文字は使えません)。</p>
    <div class="nameRow">
      <input id="displayNameInput" type="text" maxlength="20" placeholder="呼び名(任意)">
      <button id="startNegotiationBtn">この名前で始める</button>
    </div>
    <p class="err hidden" id="nameError"></p>
  </div>

  <div id="chatSection" class="hidden">
    <div class="chat" id="chat"></div>
    <div class="chatInputRow">
      <input id="chatInput" type="text" maxlength="500" placeholder="店番に話しかける…">
      <button id="sendBtn">送る</button>
    </div>
    <button id="finalizeBtn">この価格で決める</button>
    <p class="priceLine">現在の提示価格: <span id="priceLabel"></span> ICHIGO(<span id="turnLabel"></span>)</p>
  </div>

  <div id="manualWaitSection" class="hidden">
    <p>店員と直接ご相談ください。値段が決まったらここに表示されます。</p>
    <p class="priceLine">現在価格: <span id="manualPriceLabel"></span> ICHIGO</p>
  </div>

  <div id="paySection" class="hidden">
    <p class="priceLine">確定価格: <span id="finalPriceLabel"></span> ICHIGO</p>
    <button id="payBtn">② 支払ってガチャを回す</button>
  </div>

  <div id="receiptSection" class="hidden receipt">
    <h2 id="receiptTitle"></h2>
    <p class="receiptRow">お支払い: <strong id="receiptPriceLabel"></strong> ICHIGO</p>
    <p class="receiptRow muted" id="receiptTimeLabel"></p>
    <p class="receiptRow" id="receiptUnlockStatus"></p>
    <p class="receiptRow muted" id="receiptTxHashLabel"></p>
    <div id="receiptResolutionSection" class="hidden">
      <p class="receiptRow" id="resolutionPrompt"></p>
      <div class="resolutionButtons">
        <button id="resolveYesBtn">はい、受け取れました</button>
        <button id="resolveNoBtn" class="secondaryBtn">まだです、スタッフを呼びます</button>
      </div>
    </div>
    <p class="receiptRow ok hidden" id="receiptThanks">ICHIGOガチャガチャのご利用、ありがとうございました!</p>
  </div>

  <p id="status"></p>

<script type="module">
const OP_CHAIN_ID = 10;
const TOKEN_ADDR = "0x836700463Dce76D9Cc3CDf6F6EDF946312c01869";
const GAME_WALLET = "0x70775B1d24176De0fda2776303B8a603C671cFFb"; // 授業のDiscord IDに紐づく自分のウォレット
const ERC20_ABI = [
  "function balanceOf(address) view returns (uint256)",
  "function decimals() view returns (uint8)",
  "function transfer(address to, uint256 amount) returns (bool)",
];
const UNLOCK_POLL_MS = 1500;
const UNLOCK_POLL_MAX_TRIES = 30; // 約45秒。bridge側のESP32タイムアウト(30秒)+余裕分
const MANUAL_POLL_MS = 2000; // manualモード(店員と対面交渉)待機中、価格確定を待つポーリング間隔
const RECEIPT_STORAGE_KEY = "ichigo_receipt";
const RECEIPT_TTL_MS = 30 * 60 * 1000; // 決済証拠画面。古い受け取りを別の人に見せてしまわないための期限
const SESSION_STORAGE_KEY = "ichigo_negotiate_session";
const SESSION_POINTER_TTL_MS = 20 * 60 * 1000; // リロード時に名前入力を再度求めないための「しおり」

const $ = (id) => document.getElementById(id);

let provider, signer, account, token, decimals = 18n;
let sessionId = null;
let displayName = null;
let finalPrice = null;
let manualPollHandle = null;
let currentReceipt = null; // 「解決した/まだ」ボタンのハンドラが参照する、今表示中のレシート

function readJSON(key) {
  try {
    return JSON.parse(localStorage.getItem(key));
  } catch {
    return null;
  }
}
function writeJSON(key, value) {
  localStorage.setItem(key, JSON.stringify(value));
}

function showStatus(text, cls) {
  $("status").textContent = text;
  $("status").className = cls || "";
}

function hideAllSections() {
  for (const id of ["nameSection", "chatSection", "manualWaitSection", "paySection", "receiptSection"]) {
    $(id).classList.add("hidden");
  }
}

function stopManualPoll() {
  if (manualPollHandle) {
    clearInterval(manualPollHandle);
    manualPollHandle = null;
  }
}

function appendBubble(role, content) {
  const div = document.createElement("div");
  div.className = `bubble ${role === "user" ? "user" : "assistant"}`;
  div.textContent = content;
  $("chat").appendChild(div);
  $("chat").scrollTop = $("chat").scrollHeight;
  return div; // 送信失敗時にこの吹き出しを取り消せるようにするため、要素を返す
}

function renderTranscript(transcript) {
  $("chat").innerHTML = "";
  for (const m of transcript) appendBubble(m.role, m.content);
}

function setNegotiationUiState(price, turn, maxTurn) {
  $("priceLabel").textContent = price;
  $("turnLabel").textContent = `${turn}/${maxTurn}ターン`;
}

function enterPaymentPhase(price) {
  stopManualPoll();
  finalPrice = price;
  $("nameSection").classList.add("hidden");
  $("chatSection").classList.add("hidden");
  $("manualWaitSection").classList.add("hidden");
  $("finalPriceLabel").textContent = finalPrice;
  $("paySection").classList.remove("hidden");
}

// manualモード(AI無し、店員と対面で交渉)のセッションは、参加者側は入力する
// ものが無いので、店員がadmin/refill-lock.htmlで価格を確定するまで
// /negotiate-current(公開・認証不要)を軽くポーリングして待つだけでよい。
function enterManualWaitingView(price) {
  $("nameSection").classList.add("hidden");
  $("manualPriceLabel").textContent = price;
  $("manualWaitSection").classList.remove("hidden");
  stopManualPoll();
  manualPollHandle = setInterval(async () => {
    try {
      const res = await fetch("/negotiate-current");
      const data = await res.json();
      if (!data.active) {
        // スタッフに強制終了された、またはタイムアウトで放置判定された。
        stopManualPoll();
        showStatus("交渉が終了しました。お手数ですがもう一度スタッフにお声がけください", "err");
        return;
      }
      $("manualPriceLabel").textContent = data.price;
      if (data.status === "awaiting-payment") {
        enterPaymentPhase(data.price);
      }
    } catch {
      // 通信の瞬断は次のポーリングで回復するので無視する
    }
  }, MANUAL_POLL_MS);
}

async function ensureOptimism() {
  const hexId = "0x" + OP_CHAIN_ID.toString(16);
  try {
    await window.ethereum.request({ method: "wallet_switchEthereumChain", params: [{ chainId: hexId }] });
    return true;
  } catch (err) {
    if (err.code === 4902) {
      await window.ethereum.request({
        method: "wallet_addEthereumChain",
        params: [{
          chainId: hexId,
          chainName: "Optimism",
          nativeCurrency: { name: "ETH", symbol: "ETH", decimals: 18 },
          rpcUrls: ["https://mainnet.optimism.io"],
          blockExplorerUrls: ["https://optimistic.etherscan.io"],
        }],
      });
      return true;
    }
    showStatus("Optimismネットワークへの切り替えに失敗しました: " + (err.message || err), "err");
    return false;
  }
}

async function refreshBalance() {
  const bal = await token.balanceOf(account);
  $("balanceLabel").textContent = ethers.formatUnits(bal, decimals) + " ICHIGO";
  return bal;
}

async function waitForUnlock(txHash) {
  for (let i = 0; i < UNLOCK_POLL_MAX_TRIES; i++) {
    await new Promise((resolve) => setTimeout(resolve, UNLOCK_POLL_MS));
    try {
      const res = await fetch(`/unlock-status?txHash=${txHash}`);
      const data = await res.json();
      if (data.status === "unlocked" || data.status === "failed") return data.status;
    } catch {
      // ネットワークの瞬断はリトライで吸収する
    }
  }
  return "timeout";
}

// 解除がtimeout/failedになった参加者は、スタッフに直接対応してもらった後もこの画面に
// エラー文言が出たまま固まって見えてしまう(「このまま止まってしまう」という指摘)。
// スタッフに確認してもらえたかどうかを参加者自身に選んでもらい、解決済みなら
// お礼の文言に切り替える(サーバー側に解決したかを知る手段が無いため、自己申告制)。
function renderResolutionChoice(receipt) {
  $("receiptResolutionSection").classList.remove("hidden");
  if (receipt.resolution === "pending") {
    // 一度「まだです」を選んだ後は、再度「まだです」を押す必要は無いので隠す
    $("resolutionPrompt").textContent = "スタッフの対応が終わったら、下のボタンを押してください。";
    $("resolveNoBtn").classList.add("hidden");
  } else {
    $("resolutionPrompt").textContent = "スタッフに確認してもらえましたか?";
    $("resolveNoBtn").classList.remove("hidden");
  }
}

function updateReceiptStatusUI(receipt) {
  currentReceipt = receipt;
  const el = $("receiptUnlockStatus");

  if (receipt.resolution === "resolved") {
    // 解決済みなら、エラー文言・txHash・選択ボタンは不要でお礼だけ見せる
    el.textContent = "";
    $("receiptTxHashLabel").classList.add("hidden");
    $("receiptResolutionSection").classList.add("hidden");
    $("receiptThanks").classList.remove("hidden");
    return;
  }
  $("receiptTxHashLabel").classList.remove("hidden");
  $("receiptThanks").classList.add("hidden");

  const status = receipt.unlockStatus;
  if (!status || status === "pending" || status === "unknown") {
    el.textContent = "ガチャガチャを解除しています…";
    el.className = "receiptRow";
    $("receiptResolutionSection").classList.add("hidden");
  } else if (status === "unlocked") {
    el.textContent = "解除完了!カプセルをお受け取りください";
    el.className = "receiptRow ok";
    $("receiptResolutionSection").classList.add("hidden");
  } else {
    const reason = status === "timeout" ? "解除確認がタイムアウトしました" : "実機の解除に失敗しました";
    el.textContent = `${reason}。このtxHashをスタッフにお見せください`;
    el.className = "receiptRow err";
    renderResolutionChoice(receipt);
  }
}

$("resolveYesBtn").addEventListener("click", () => {
  if (!currentReceipt) return;
  currentReceipt.resolution = "resolved";
  writeJSON(RECEIPT_STORAGE_KEY, currentReceipt);
  updateReceiptStatusUI(currentReceipt);
});
$("resolveNoBtn").addEventListener("click", () => {
  if (!currentReceipt) return;
  currentReceipt.resolution = "pending";
  writeJSON(RECEIPT_STORAGE_KEY, currentReceipt);
  updateReceiptStatusUI(currentReceipt);
});

// 決済成功の証拠画面を描画する。仮に機材(ESP32)側でトラブルがあっても、
// この画面自体(名前・金額・時刻・txHash)は消えないので、参加者がスタッフに
// 見せれば対応できるようにする、という設計。
function renderReceipt(receipt) {
  hideAllSections();
  // レシート画面は決済の最終状態(仮に機材トラブルがあっても証拠として残す画面)
  // なので、ウォレット接続UI等は隠して混乱を避ける。
  $("connectBtn").classList.add("hidden");
  $("account").classList.add("hidden");
  $("balanceLabel").classList.add("hidden");
  $("receiptTitle").textContent = `${receipt.displayName || "お客"}さん、お買い上げありがとうございます!`;
  $("receiptPriceLabel").textContent = receipt.price;
  $("receiptTimeLabel").textContent = "支払い時刻: " + new Date(receipt.paidAt).toLocaleString("ja-JP");
  $("receiptTxHashLabel").textContent = "txHash: " + receipt.txHash;
  updateReceiptStatusUI(receipt);
  $("receiptSection").classList.remove("hidden");
}

function enterReceiptPhase({ wallet, displayName, price, txHash, sessionId }) {
  stopManualPoll();
  const receipt = { wallet, displayName, price, txHash, sessionId, paidAt: Date.now(), unlockStatus: "pending" };
  writeJSON(RECEIPT_STORAGE_KEY, receipt);
  localStorage.removeItem(SESSION_STORAGE_KEY); // セッションは消費済み。再開の必要は無い
  renderReceipt(receipt);
  showStatus("", "");

  waitForUnlock(txHash).then((status) => {
    receipt.unlockStatus = status;
    writeJSON(RECEIPT_STORAGE_KEY, receipt);
    updateReceiptStatusUI(receipt);
  });
}

// ページ読み込み時、有効期限内の証拠画面が残っていればそれを最優先で復元する
// (リロード・タブのバックグラウンド復帰でも消えないようにするのが目的)。
// unlockStatusがまだ確定していなければ、その場で解除確認をもう一度やり直す
// (固まった古いスナップショットのまま表示され続ける事故を防ぐ)。
function tryRestoreReceipt() {
  const receipt = readJSON(RECEIPT_STORAGE_KEY);
  if (!receipt) return false;
  if (Date.now() - receipt.paidAt > RECEIPT_TTL_MS) {
    localStorage.removeItem(RECEIPT_STORAGE_KEY);
    return false;
  }
  renderReceipt(receipt);
  if (!receipt.unlockStatus || receipt.unlockStatus === "pending" || receipt.unlockStatus === "unknown") {
    waitForUnlock(receipt.txHash).then((status) => {
      receipt.unlockStatus = status;
      writeJSON(RECEIPT_STORAGE_KEY, receipt);
      updateReceiptStatusUI(receipt);
    });
  }
  return true;
}

// localStorageのレシートが(ブラウザ/ウォレットアプリがタブを破棄する等で)消えてしまった
// 場合の保険。ウォレット接続直後にサーバー側の記録(/negotiate-receipt)へ直近の購入が
// 無いか問い合わせ、見つかればそこから復元する。何度リロード・再接続してもレシートが
// 消えたままにならないようにするための仕組み。
//
// wallet単体だけでは誰でも他人のレシート(ニックネーム・支払額等)を見られてしまうため、
// サーバーが発行したnonceにMetaMaskで署名し、本人のウォレットであることを証明してから
// 問い合わせる(セキュリティレビューで指摘、2026-07-07修正)。
async function tryRestoreReceiptFromServer(wallet) {
  let nonceData;
  try {
    const nonceRes = await fetch("/negotiate-receipt-challenge", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ wallet }),
    });
    nonceData = await nonceRes.json();
  } catch {
    return false;
  }
  if (!nonceData.ok) return false;

  let signature;
  try {
    signature = await signer.signMessage(nonceData.nonce);
  } catch {
    // 署名を拒否/失敗した場合はレシート復元をあきらめ、通常の交渉開始フローに進む
    // (レシートが無い参加者にとってはこれが正常なパスなので、エラー表示はしない)。
    return false;
  }

  let data;
  try {
    const res = await fetch("/negotiate-receipt", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ wallet, signature }),
    });
    data = await res.json();
  } catch {
    return false;
  }
  if (!data.ok || !data.found) return false;

  const receipt = {
    wallet,
    displayName: data.displayName,
    price: data.price,
    txHash: data.txHash,
    sessionId: null,
    paidAt: data.paidAt,
    unlockStatus: data.unlockStatus,
  };
  writeJSON(RECEIPT_STORAGE_KEY, receipt);
  renderReceipt(receipt);
  if (!receipt.unlockStatus || receipt.unlockStatus === "pending" || receipt.unlockStatus === "unknown") {
    waitForUnlock(receipt.txHash).then((status) => {
      receipt.unlockStatus = status;
      writeJSON(RECEIPT_STORAGE_KEY, receipt);
      updateReceiptStatusUI(receipt);
    });
  }
  return true;
}

if (window.ethereum) {
  window.ethereum.on("accountsChanged", (accounts) => {
    if (!accounts.length || !signer) return; // まだ接続前なら何もしない
    // sessionId・チャット/支払いUIの状態、tokenコントラクトの署名者(古いsignerを参照し続ける)を
    // 個別に直すより、ページを再読み込みして最初からやり直してもらう方が確実(このページの
    // 複雑さに対して十分な対応)。
    location.reload();
  });
}

async function startNegotiation(nameToSubmit) {
  let res;
  try {
    res = await fetch("/negotiate-start", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ wallet: account, displayName: nameToSubmit || "" }),
    });
  } catch (err) {
    showStatus("交渉開始に失敗しました: " + (err.message || err), "err");
    return;
  }

  let data;
  try {
    data = await res.json();
  } catch {
    showStatus("交渉開始の応答を読み取れませんでした", "err");
    return;
  }

  if (!data.ok) {
    showStatus(data.error || "交渉を開始できませんでした", "err");
    return;
  }

  sessionId = data.sessionId;
  displayName = data.displayName;
  writeJSON(SESSION_STORAGE_KEY, {
    wallet: account.toLowerCase(),
    sessionId,
    displayName,
    mode: data.mode,
    savedAt: Date.now(),
  });

  if (data.status === "awaiting-payment") {
    enterPaymentPhase(data.price);
    return;
  }

  if (data.mode === "manual") {
    enterManualWaitingView(data.price);
    return;
  }

  renderTranscript(data.transcript);
  setNegotiationUiState(data.price, data.turn, data.maxTurn);
  $("nameSection").classList.add("hidden");
  $("chatSection").classList.remove("hidden");
}

const FINAL_REPLY_READ_MS = 1800; // 交渉成立直後、AIの最後の返答を読めるように支払い画面への切り替えを少し待つ

async function sendChatMessage(message) {
  const userBubble = appendBubble("user", message);
  $("sendBtn").disabled = true;
  $("finalizeBtn").disabled = true; // 送信結果が返るまでは「この価格で決める」も待たせる(server.js側のbusyロックと二重で守る)
  try {
    const res = await fetch("/negotiate-message", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sessionId, message }),
    });
    const data = await res.json();
    if (!data.ok) {
      // サーバー側には記録されていないので、表示だけ先行していた発言を引っ込めて
      // 入力欄に戻す(見た目だけ送信済みで実際は送られていない、という不整合を防ぐ)。
      userBubble.remove();
      $("chatInput").value = message;
      showStatus(data.error || "送信に失敗しました", "err");
      $("sendBtn").disabled = false;
      $("finalizeBtn").disabled = false;
      return;
    }
    appendBubble("assistant", data.reply);
    setNegotiationUiState(data.price, data.turn, data.maxTurn);
    if (data.done) {
      // 送信直後にすぐ支払い画面へ切り替えると、AIの最後の返答を読む前に画面が
      // 変わってしまう(「送ったら即座に画面が変わる」という指摘)。少し待ってから切り替える。
      showStatus("交渉成立!支払い画面に切り替わります…", "ok");
      setTimeout(() => enterPaymentPhase(data.price), FINAL_REPLY_READ_MS);
      return; // ボタンはenterPaymentPhaseで画面自体が隠れるまで無効のままにする
    }
    $("sendBtn").disabled = false;
    $("finalizeBtn").disabled = false;
  } catch (err) {
    userBubble.remove();
    $("chatInput").value = message;
    showStatus("送信に失敗しました: " + (err.message || err), "err");
    $("sendBtn").disabled = false;
    $("finalizeBtn").disabled = false;
  }
}

$("connectBtn").addEventListener("click", async () => {
  if (!window.ethereum) {
    showStatus("ウォレットが見つかりません。MetaMaskアプリ内のブラウザでこのページを開いてください", "err");
    return;
  }
  try {
    if (!(await ensureOptimism())) return;
    provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    signer = await provider.getSigner();
    account = await signer.getAddress();
    token = new ethers.Contract(TOKEN_ADDR, ERC20_ABI, signer);
    decimals = await token.decimals();

    $("account").textContent = account;
    await refreshBalance();
    $("connectBtn").disabled = true;
    showStatus("", "");

    // localStorageのレシートが消えてしまっていても、サーバー側に直近の購入記録が
    // 残っていればそこから復元する(何度再接続してもレシートが消えたままにならない
    // ようにするための保険)。見つかった場合はここで終了し、通常の交渉開始には進まない。
    if (await tryRestoreReceiptFromServer(account)) return;

    // すでにこのウォレットで交渉を始めていた(ページ再読み込み等)場合は、名前入力を
    // 再度求めず、そのまま再開する。しおり自体が古すぎる(TTL超過)場合は無視して
    // 通常通り名前入力から始める(その場合サーバー側もどうせ新規セッションを作るだけ)。
    const saved = readJSON(SESSION_STORAGE_KEY);
    if (saved && saved.wallet === account.toLowerCase() && Date.now() - saved.savedAt < SESSION_POINTER_TTL_MS) {
      await startNegotiation(saved.displayName || "");
    } else {
      $("nameSection").classList.remove("hidden");
    }
  } catch (err) {
    showStatus("接続エラー: " + (err.shortMessage || err.message || err), "err");
  }
});

// ESP32のOLEDフォント(ひらがな・カタカナ・半角英数字中心)が表示できる文字だけに
// 絞る。サーバー側(sanitizeDisplayName)にも同じフィルタがあるが、ここで先に
// 案内しておくことで、送信してから初めて文字が消えていることに気づく事故を防ぐ。
const DISPLAY_NAME_PATTERN = /^[0-9A-Za-z぀-ヿ ]*$/;

$("startNegotiationBtn").addEventListener("click", () => {
  const name = $("displayNameInput").value.trim();
  if (!DISPLAY_NAME_PATTERN.test(name)) {
    $("nameError").textContent = "ひらがな・カタカナ・半角英数字のみ使えます(漢字や絵文字は使えません)。修正してください";
    $("nameError").classList.remove("hidden");
    return;
  }
  $("nameError").classList.add("hidden");
  startNegotiation(name);
});

$("sendBtn").addEventListener("click", () => {
  const input = $("chatInput");
  const message = input.value.trim();
  if (!message) return;
  input.value = "";
  sendChatMessage(message);
});
$("chatInput").addEventListener("keydown", (e) => {
  if (e.key !== "Enter") return;
  // 日本語入力(IME)中に変換を確定するEnterもkeydownで"Enter"として来てしまい、
  // 変換確定のつもりが誤送信になっていた(isComposing/keyCode 229で判別して無視する)。
  if (e.isComposing || e.keyCode === 229) return;
  e.preventDefault();
  $("sendBtn").click();
});

$("finalizeBtn").addEventListener("click", async () => {
  $("sendBtn").disabled = true;
  $("finalizeBtn").disabled = true;
  try {
    const res = await fetch("/negotiate-finalize", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sessionId }),
    });
    const data = await res.json();
    if (!data.ok) {
      showStatus(data.error || "確定できませんでした", "err");
      return;
    }
    enterPaymentPhase(data.price);
  } catch (err) {
    showStatus("確定に失敗しました: " + (err.message || err), "err");
  } finally {
    $("sendBtn").disabled = false;
    $("finalizeBtn").disabled = false;
  }
});

$("payBtn").addEventListener("click", async () => {
  const btn = $("payBtn");
  try {
    btn.disabled = true;
    const amount = ethers.parseUnits(String(finalPrice), decimals);
    const bal = await refreshBalance();
    if (bal < amount) {
      showStatus(`イチゴが足りません(必要: ${finalPrice})`, "err");
      return;
    }

    showStatus("MetaMaskで送金を承認してください…", "");
    const tx = await token.transfer(GAME_WALLET, amount);

    showStatus("送金を確認中…(数秒)", "");
    await tx.wait();
    await refreshBalance();

    showStatus("送金確定。オンチェーンで検証しています…", "");
    const res = await fetch("/verify-and-unlock", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ txHash: tx.hash, sessionId }),
    });
    const data = await res.json();

    if (!data.ok) {
      showStatus("送金の確認に失敗しました: " + (data.error || "不明なエラー") + `\n(txHash: ${tx.hash})`, "err");
      return;
    }

    // オンチェーンでの検証はOK。ここで即座に「支払い完了」を出すのではなく、
    // まず証拠画面(レシート)に切り替える。実機の解除確認はその画面の中で
    // 続けて行い、失敗・タイムアウトしてもこの画面自体は残る(スタッフに見せられる)。
    enterReceiptPhase({ wallet: account, displayName, price: finalPrice, txHash: tx.hash, sessionId });
  } catch (err) {
    showStatus("エラー: " + (err.shortMessage || err.message || err), "err");
  } finally {
    btn.disabled = false;
  }
});

// ページ読み込み時、有効期限内の証拠画面が残っていればそれを最優先で表示する
// (見つからなければ何もしない。接続ボタンがデフォルトで表示されている状態のまま)。
tryRestoreReceipt();
</script>
</body>
</html>
