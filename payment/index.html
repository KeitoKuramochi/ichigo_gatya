<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ICHIGO 決済</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;800&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.2/ethers.umd.min.js"
        integrity="sha512-f+t6//rz3Iy3hp1CiwtsigYtyWuGk7bf6xl2RTOPvmyMIfTQJ4iy6Lg1dah1bsLQ9SLideJGicgmOkBsBXP1aA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<style>
  /* negotiate/index.htmlと共通のトークン(詳しい説明はそちら参照)。 */
  :root {
    --paper: #f3e7d2; --paper-deep: #e9dab8; --ink: #2b2118; --ink-soft: #7a6a54;
    --vermilion: #c1402e; --vermilion-deep: #8f2f20; --indigo: #33415c;
    --font-display: 'Shippori Mincho', serif; --font-body: 'Zen Maru Gothic', system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html { background: var(--paper); }
  body { font-family: var(--font-body); max-width: 480px; margin: 0 auto; padding: 0 18px 40px; color: var(--ink); background: var(--paper); }
  h1 { font-family: var(--font-display); font-size: 1.4rem; margin: 20px 0 4px; }
  .headerBanner { display: block; width: calc(100% + 36px); margin: 0 -18px 12px; height: auto; }
  button .btnIcon { width: 1.7em; height: 1.7em; vertical-align: middle; margin-right: 8px; }
  button {
    font-family: var(--font-body); font-size: 1rem; font-weight: 700; padding: 11px 18px; border-radius: 10px; border: none;
    background: var(--vermilion); color: #fff8ee; cursor: pointer;
    box-shadow: 0 3px 0 var(--vermilion-deep), 0 4px 8px rgba(0,0,0,.18);
  }
  button:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--vermilion-deep), 0 2px 4px rgba(0,0,0,.18); }
  button:disabled { background: #cec2ab; color: #8c7f68; box-shadow: none; cursor: default; }
  .balance {
    position: relative; display: inline-block; font-family: var(--font-display); font-weight: 800; font-size: 1.15rem;
    color: var(--vermilion-deep); background: var(--paper-deep); border: 1px solid rgba(43,33,24,.22);
    border-radius: 4px 13px 4px 13px; padding: 4px 16px 4px 20px; transform: rotate(-1.5deg);
    box-shadow: 2px 3px 0 rgba(43,33,24,.12);
  }
  .balance:empty { display: none; }
  .balance::before {
    content: ""; position: absolute; left: 7px; top: 50%; transform: translateY(-50%);
    width: 6px; height: 6px; border-radius: 50%; background: var(--paper); box-shadow: inset 0 0 0 1px rgba(43,33,24,.35);
  }
  .muted { color: var(--ink-soft); font-size: .85rem; }
  .ok { color: #3f7a4f; }
  .err { color: #b3392a; white-space: pre-wrap; }
</style>
</head>
<body>
  <img src="assets/header-banner-simple.png" alt="" class="headerBanner">
  <h1>ICHIGO ガチャガチャ</h1>
  <p class="muted">ウォレットを接続して支払うと、実機のガチャガチャのロックが解除されます。</p>

  <button id="connectBtn"><img class="btnIcon" src="assets/icon-wallet.png" alt="">ウォレットを接続</button>
  <p class="muted">アカウントを間違えた場合は、MetaMask側でアカウントを切り替えてください(自動で反映されます)</p>
  <p class="muted" id="account"></p>
  <p class="balance" id="balanceLabel"></p>

  <button id="payBtn" disabled><img class="btnIcon" src="assets/icon-buy.png" alt="">支払ってガチャを回す(<span id="costLabel"></span> ICHIGO)</button>
  <p id="status"></p>

<script type="module">
const OP_CHAIN_ID = 10;
const TOKEN_ADDR = "0x836700463Dce76D9Cc3CDf6F6EDF946312c01869";
const GAME_WALLET = "0x70775B1d24176De0fda2776303B8a603C671cFFb"; // 授業のDiscord IDに紐づく自分のウォレット
const COST = 100;
const ERC20_ABI = [
  "function balanceOf(address) view returns (uint256)",
  "function decimals() view returns (uint8)",
  "function transfer(address to, uint256 amount) returns (bool)",
];

const $ = (id) => document.getElementById(id);
$("costLabel").textContent = COST;

// このページ自身がブリッジサーバーから配信されている場合は同一オリジン(相対パス)でよいが、
// Vercelなど別オリジンで配信する場合は、QRコードのURLに ?bridge=https://xxxx のように
// その日のブリッジ(トンネル)のURLを付けておけば、それを使って通知する。
const BRIDGE_BASE = new URLSearchParams(location.search).get("bridge") || "";
const VERIFY_URL = BRIDGE_BASE.replace(/\/$/, "") + "/verify-and-unlock";
const UNLOCK_STATUS_URL = BRIDGE_BASE.replace(/\/$/, "") + "/unlock-status";
const UNLOCK_POLL_MS = 1500;
const UNLOCK_POLL_MAX_TRIES = 20; // 約30秒。ESP32側のタイムアウト(15秒)+余裕分

let provider, signer, account, token, decimals = 18n;

function showStatus(text, cls) {
  $("status").textContent = text;
  $("status").className = cls || "";
}

async function ensureOptimism() {
  const hexId = "0x" + OP_CHAIN_ID.toString(16);
  try {
    await window.ethereum.request({ method: "wallet_switchEthereumChain", params: [{ chainId: hexId }] });
    return true;
  } catch (err) {
    if (err.code === 4902) {
      await window.ethereum.request({
        method: "wallet_addEthereumChain",
        params: [{
          chainId: hexId,
          chainName: "Optimism",
          nativeCurrency: { name: "ETH", symbol: "ETH", decimals: 18 },
          rpcUrls: ["https://mainnet.optimism.io"],
          blockExplorerUrls: ["https://optimistic.etherscan.io"],
        }],
      });
      return true;
    }
    showStatus("Optimismネットワークへの切り替えに失敗しました: " + (err.message || err), "err");
    return false;
  }
}

async function refreshBalance() {
  const bal = await token.balanceOf(account);
  $("balanceLabel").textContent = ethers.formatUnits(bal, decimals) + " ICHIGO";
  return bal;
}

// 送金の検証がOKでも、ESP32が実際にサーボを動かして報告してくるまでは
// 「支払い完了」を表示しない。ここで待たずに完了表示してしまうと、ESP32が
// オフライン等で解除できなかった場合に、決済者が気づかないまま
// (イチゴだけ取られてロックは開かない)終わってしまうため。
async function waitForUnlock(txHash) {
  for (let i = 0; i < UNLOCK_POLL_MAX_TRIES; i++) {
    await new Promise((resolve) => setTimeout(resolve, UNLOCK_POLL_MS));
    try {
      const res = await fetch(`${UNLOCK_STATUS_URL}?txHash=${txHash}`);
      const data = await res.json();
      if (data.status === "unlocked" || data.status === "failed") return data.status;
    } catch {
      // ネットワークの瞬断はリトライで吸収する
    }
  }
  return "timeout";
}

// MetaMask側でアカウントを切り替えた時に、ページ側も自動で追従する
if (window.ethereum) {
  window.ethereum.on("accountsChanged", async (accounts) => {
    if (!accounts.length || !signer) return; // まだ接続前なら何もしない
    signer = await provider.getSigner();
    account = accounts[0];
    $("account").textContent = account;
    await refreshBalance();
    showStatus("アカウントを切り替えました", "ok");
  });
}

$("connectBtn").addEventListener("click", async () => {
  if (!window.ethereum) {
    showStatus("ウォレットが見つかりません。MetaMaskアプリ内のブラウザでこのページを開いてください", "err");
    return;
  }
  try {
    if (!(await ensureOptimism())) return;
    provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    signer = await provider.getSigner();
    account = await signer.getAddress();
    token = new ethers.Contract(TOKEN_ADDR, ERC20_ABI, signer);
    decimals = await token.decimals();

    $("account").textContent = account;
    await refreshBalance();
    $("payBtn").disabled = false;
    showStatus("", "");
  } catch (err) {
    showStatus("接続エラー: " + (err.shortMessage || err.message || err), "err");
  }
});

$("payBtn").addEventListener("click", async () => {
  const btn = $("payBtn");
  try {
    btn.disabled = true;
    const amount = ethers.parseUnits(String(COST), decimals);
    const bal = await refreshBalance();
    if (bal < amount) {
      showStatus(`イチゴが足りません(必要: ${COST})`, "err");
      return;
    }

    showStatus("MetaMaskで送金を承認してください…", "");
    const tx = await token.transfer(GAME_WALLET, amount);

    showStatus("送金を確認中…(数秒)", "");
    await tx.wait();
    await refreshBalance();

    // 同一オリジン(相対パス)か、?bridge=で指定されたトンネルURLに通知し、実機を解除してもらう。
    showStatus("送金確定。オンチェーンで検証しています…", "");
    const res = await fetch(VERIFY_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ txHash: tx.hash }),
    });
    const data = await res.json();

    if (!data.ok) {
      showStatus("送金の確認に失敗しました: " + (data.error || "不明なエラー") + `\n(txHash: ${tx.hash})`, "err");
      return;
    }

    // ここでは「確認OK」なだけで、ガチャガチャがまだ実際に解除されたとは限らない
    // (ESP32がオフライン・通信エラーの可能性がある)。ESP32からの報告を待ってから表示する。
    showStatus("検証OK。ガチャガチャの解除を確認しています…", "");
    const unlockStatus = await waitForUnlock(tx.hash);

    if (unlockStatus === "unlocked") {
      showStatus("支払い完了! ガチャガチャのロックが解除されました。カプセルをお受け取りください", "ok");
    } else {
      const reason = unlockStatus === "timeout" ? "解除確認がタイムアウトしました" : "実機の解除に失敗しました";
      showStatus(
        `送金は完了していますが、${reason}。\nお手数ですが下記のtxHashをスタッフにお伝えください:\n${tx.hash}`,
        "err"
      );
    }
  } catch (err) {
    showStatus("エラー: " + (err.shortMessage || err.message || err), "err");
  } finally {
    btn.disabled = false;
  }
});
</script>
</body>
</html>
