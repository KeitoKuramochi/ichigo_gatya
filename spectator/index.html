<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ICHIGO ガチャガチャ AI店番 - 投影用</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;800&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* negotiate/index.htmlと共通のトークン。この画面は暗い舞台なので、
     朱色そのものよりも提灯の金色(ゴールド)を主アクセントとして使う。 */
  :root { --gold: #e0b25c; --vermilion: #d1573f; }
  body { font-family: 'Zen Maru Gothic', system-ui, sans-serif; margin: 0; padding: 24px; background: #111 url(assets/stage-bg.png) center/cover no-repeat fixed; color: #eee; }
  h1 { font-family: 'Shippori Mincho', serif; font-size: 2rem; margin: 0 0 4px; display: flex; align-items: center; justify-content: center; gap: 12px; }
  .muted { color: #aaa; font-size: 1.1rem; }
  .idle { text-align: center; margin-top: 12vh; }
  .idle h2 { font-family: 'Shippori Mincho', serif; font-size: 2.2rem; color: var(--gold); }
  .characterImg { width: 220px; height: 220px; object-fit: contain; display: block; margin: 0 auto 12px; }
  .characterSmall { width: 64px; height: 64px; object-fit: contain; }
  .priceLine { font-family: 'Shippori Mincho', serif; font-size: 2.2rem; font-weight: 700; color: var(--gold); margin: 8px 0; }
  .turnLine { font-size: 1.3rem; color: #aaa; }
  .chat { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
  .bubble { max-width: 70%; padding: 14px 18px; border-radius: 16px; font-size: 1.4rem; line-height: 1.5; white-space: pre-wrap; }
  .bubble.user { margin-left: auto; background: var(--vermilion); color: #fff8ee; }
  .bubble.assistant { margin-right: auto; background: #2a2a2a; color: #eee; }
  .manualNotice { margin-top: 20px; font-size: 1.6rem; color: #aaa; text-align: center; }
  .completed { position: relative; text-align: center; margin-top: 12vh; }
  .completed .confettiBg { position: absolute; inset: -40px; background: url(assets/confetti-overlay.png) 0 0/300px 300px repeat; opacity: .5; z-index: -1; }
  .completed h2 { font-family: 'Shippori Mincho', serif; font-size: 2.4rem; color: var(--gold); margin-bottom: 12px; }
  .completed .priceLine { justify-content: center; }
  .hidden { display: none; }
</style>
</head>
<body>
  <div id="idleView" class="idle">
    <img src="assets/ichigoban-greet.png" alt="" class="characterImg">
    <h2>ICHIGO ガチャガチャ AI店番</h2>
    <p class="muted">QRコードをスキャンして交渉を始めてください</p>
  </div>

  <div id="completedView" class="hidden completed">
    <div class="confettiBg"></div>
    <img src="assets/ichigoban-thanks.png" alt="" class="characterImg">
    <h2>ありがとうございました!</h2>
    <p class="priceLine"><span id="completedNameLabel"></span>さん、<span id="completedPriceLabel"></span> ICHIGO</p>
    <p class="muted">次の方、お待たせしました</p>
  </div>

  <div id="activeView" class="hidden">
    <h1><img src="assets/ichigoban-thinking.png" alt="" class="characterSmall">交渉中(<span id="walletLabel"></span>)</h1>
    <p class="priceLine">現在の提示価格: <span id="priceLabel"></span> ICHIGO</p>
    <p class="turnLine" id="turnLine"><span id="turnLabel"></span></p>
    <div class="chat" id="chat"></div>
    <p class="manualNotice hidden" id="manualNotice">スタッフと直接交渉中です</p>
  </div>

<script type="module">
const POLL_MS = 2000;
const $ = (id) => document.getElementById(id);

// 「再描画をスキップするか」の判定キー。transcript.lengthだけで判定すると、
// Aさんの交渉終了直後にBさんが交渉を始め、たまたま会話の往復回数が同じ長さに
// なった場合に、名前・価格ラベルはBさんに切り替わるのにチャット本文だけAさんの
// 古い内容が残る、という誤表示が起きる。マスク済みウォレット(既存の公開フィールド)
// の変化も見ることでセッションの切り替わりを検知する(sessionId自体は/negotiate-message等が
// 知っていれば操作できてしまうため、投影ページ経由で不特定多数に晒す新しい公開項目にはしない)。
let lastRenderedKey = null;

function renderTranscript(wallet, transcript) {
  const key = `${wallet}:${transcript.length}`;
  if (key === lastRenderedKey) return;
  lastRenderedKey = key;
  const chat = $("chat");
  chat.innerHTML = "";
  for (const m of transcript) {
    const div = document.createElement("div");
    div.className = `bubble ${m.role === "user" ? "user" : "assistant"}`;
    div.textContent = m.content;
    chat.appendChild(div);
  }
  chat.scrollTop = chat.scrollHeight;
}

function showOnly(viewId) {
  for (const id of ["idleView", "completedView", "activeView"]) {
    $(id).classList.toggle("hidden", id !== viewId);
  }
}

async function poll() {
  try {
    const res = await fetch("/negotiate-current");
    const data = await res.json();

    if (data.active) {
      showOnly("activeView");
      $("walletLabel").textContent = data.displayName || data.wallet;

      if (data.mode === "manual") {
        // manualモード(店員と対面で交渉)はサーバー側にチャット履歴が無いので、
        // チャット欄の代わりにプレースホルダを出し、ターン数表示も隠す。
        $("chat").classList.add("hidden");
        $("turnLine").classList.add("hidden");
        $("manualNotice").classList.remove("hidden");
        lastRenderedKey = null;
      } else {
        $("chat").classList.remove("hidden");
        $("turnLine").classList.remove("hidden");
        $("manualNotice").classList.add("hidden");
        renderTranscript(data.wallet, data.transcript);
      }

      $("priceLabel").textContent = data.price;
      $("turnLabel").textContent =
        data.status === "awaiting-payment" ? `${data.price} ICHIGOで確定・支払い待ち` : `${data.turn}/${data.maxTurn}ターン`;
      return;
    }

    lastRenderedKey = null;

    if (data.justCompleted) {
      showOnly("completedView");
      $("completedNameLabel").textContent = data.justCompleted.displayName || data.justCompleted.wallet;
      $("completedPriceLabel").textContent = data.justCompleted.price;
      return;
    }

    showOnly("idleView");
  } catch {
    // 一時的な通信エラーは次のポーリングで回復するので無視する
  }
}

poll();
setInterval(poll, POLL_MS);
</script>
</body>
</html>
